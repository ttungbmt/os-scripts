name: install
help: Install tools and components
commands:
- name: multi
  help: Install multiple tools at once (comma or space separated)
  examples:
  - gt install multi kubectl k9s argocd
  - gt install multi kubectl,k9s,argocd
  - gt install multi --force kubectl k9s
  args:
  - name: tools
    help: List of tools to install (e.g., kustomize k9s or kustomize,k9s)
    required: true
    repeatable: true
  flags:
  - long: --force
    short: -f
    help: Force overwrite if tools are already installed
- name: kustomize
  help: Install Kustomize
  flags: &std_install_flags
  - long: --version
    short: -v
    arg: version
    help: "Version to install (e.g., latest)"
    default: latest
  - long: --force
    short: -f
    help: "Force overwrite if already installed"

- name: k9s
  help: Install k9s
  flags: *std_install_flags

- name: kubectl
  help: Install kubectl
  flags: *std_install_flags

