name: install
help: Install tools and components
commands:
- name: multi
  help: Install multiple tools at once (comma or space separated)
  args:
  - name: tools
    help: List of tools to install (e.g., kustomize k9s or kustomize,k9s)
    required: true
    repeatable: true
  flags:
  - long: --force
    short: -f
    help: Force overwrite if tools are already installed
- name: kustomize
  help: Install Kustomize
  flags:
  - long: --version
    short: -v
    arg: version
    help: Kustomize version to install (e.g., v5.4.1 or latest)
    default: latest
  - long: --force
    short: -f
    help: Force overwrite if Kustomize is already installed

- name: k9s
  help: Install k9s
  flags:
  - long: --version
    short: -v
    arg: version
    help: k9s version to install (e.g., v0.32.4 or latest)
    default: latest
  - long: --force
    short: -f
    help: Force overwrite if k9s is already installed

- name: kubectl
