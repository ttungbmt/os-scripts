name: gt
help: OS Scripts CLI — Install & manage DevOps tools
version: 0.1.0

environment_variables:
- name: GITHUB_TOKEN
  help: "GitHub API token (raises rate limit 60→5000 req/hr for `gt outdated`)"
- name: GT_DOWNLOAD_TIMEOUT
  help: "Override curl download timeout in seconds (default 30)"

dependencies:
- curl
- tar

footer: |
  Repo:    https://github.com/ttungbmt/os-scripts
  Roadmap: see ROADMAPS.md

examples:
- gt install kubectl
- gt install kubectl --version v1.30.0
- gt install multi kubectl k9s argocd
- gt outdated --all

commands:
- import: src/commands/install.yml
- import: src/commands/uninstall.yml
- import: src/commands/setup.yml
- import: src/commands/outdated.yml
- name: completions
  help: Generate shell completion script
  args:
  - name: shell
    help: Shell type (bash or zsh)
    allowed: [bash, zsh]
    default: bash
