volumes:
  ubuntu_home:
    external: true

services:
  shell:
    build:
      context: .
      dockerfile: docker/Dockerfile
    volumes:
      - .:/home/ubuntu/workspace
      - ubuntu_home:/home/ubuntu
    environment:
      - GITHUB_TOKEN
    ports:
      - "2222:22"
    stdin_open: true
    tty: true

  test:
    build:
      context: .
      dockerfile: docker/Dockerfile
    volumes:
      - .:/workspace
    working_dir: /workspace
    environment:
      - GITHUB_TOKEN
    command: ["/workspace/docker/smoke-test.sh"]
